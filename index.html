<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>IPTV — Mobile Ready</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #0a0c12;
        }
        /* Шапка */
        .header {
            background: #0f111a;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
            z-index: 20;
            position: relative;
        }
        .logo {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            white-space: nowrap;
        }
        .playlist-strip {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            flex: 1;
            scrollbar-width: thin;
        }
        .playlist-btn {
            background: #1e2230;
            border: none;
            color: #ddd;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            white-space: nowrap;
            cursor: pointer;
            z-index: 21;
            transition: 0.1s;
        }
        .playlist-btn:active {
            background: #3a4055;
        }
        .playlist-btn.active {
            background: #00b4d8;
            color: #000;
            font-weight: 500;
        }
        .embed-btn {
            background: #2a2f40;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            z-index: 21;
        }
        .embed-btn:active {
            background: #3e455e;
        }
        /* Основная область */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        /* Сайдбар */
        .sidebar {
            width: 270px;
            background: #0c0f17;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #222;
            flex-shrink: 0;
            overflow: hidden;
            z-index: 10;
        }
        .search-box {
            padding: 8px 10px;
            background: #0f111a;
            border-bottom: 1px solid #222;
        }
        .search-box input {
            width: 100%;
            background: #1a1e2a;
            border: none;
            padding: 8px 12px;
            border-radius: 30px;
            color: white;
            font-size: 13px;
            outline: none;
        }
        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 4px;
            -webkit-overflow-scrolling: touch;
        }
        .channel-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            margin: 2px 6px;
            border-radius: 10px;
            cursor: pointer;
            background: transparent;
        }
        .channel-item:active {
            background: #2a2f40;
        }
        .channel-item.active {
            background: #1e3a44;
            border-left: 2px solid #00b4d8;
        }
        .channel-name {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .channel-group {
            font-size: 0.6rem;
            color: #9aa1b0;
        }
        /* Видео область */
        .video-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            min-width: 0;
            z-index: 5;
        }
        .player-wrapper {
            flex: 1;
            background: #000;
            position: relative;
        }
        #player-container {
            width: 100%;
            height: 100%;
            background: #000;
        }
        .player-bar {
            background: #0b0e16;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-shrink: 0;
            border-top: 1px solid #222;
            z-index: 10;
            position: relative;
        }
        .channel-info {
            flex: 1;
            min-width: 0;
        }
        .current-name {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .current-group {
            font-size: 0.6rem;
            color: #aaa;
        }
        .action-btn {
            background: #1e2436;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 4px;
        }
        .action-btn:active {
            background: #3a4055;
        }
        /* Мобильная версия */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 85%;
                max-width: 280px;
                z-index: 200;
                transform: translateX(-100%);
                transition: none; /* мгновенно, без анимации */
                box-shadow: none;
                border-right: none;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .overlay {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.7);
                z-index: 150;
                pointer-events: auto;
            }
            .overlay.show {
                display: block;
            }
            .mobile-menu-btn {
                display: block !important;
                background: none;
                border: none;
                color: white;
                font-size: 1.4rem;
                padding: 0 6px;
                cursor: pointer;
                z-index: 30;
            }
            .playlist-strip {
                order: 2;
                flex: 2;
            }
            .logo {
                font-size: 0.95rem;
            }
            .header {
                padding: 6px 8px;
            }
            .action-btn {
                padding: 4px 8px;
                font-size: 11px;
            }
        }
        @media (min-width: 769px) {
            .mobile-menu-btn {
                display: none !important;
            }
        }
        /* Модалка embed */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #151e2c;
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            padding: 18px;
            position: relative;
        }
        .embed-code {
            background: #0a0e1a;
            padding: 10px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 10px;
            word-break: break-all;
            margin: 12px 0;
            max-height: 150px;
            overflow: auto;
        }
        .copy-btn {
            background: #00b4d8;
            border: none;
            padding: 8px;
            border-radius: 30px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 26px;
            color: white;
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 10px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <div class="logo">IPTV Player</div>
        <div class="playlist-strip" id="playlistStrip">
            <button class="playlist-btn active" data-playlist="livem3u">LIVEM3U</button>
            <button class="playlist-btn" data-playlist="zabava">WINK Zabava</button>
            <button class="playlist-btn" data-playlist="zabavaoff">WINK Off.</button>
            <button class="playlist-btn" data-playlist="soyuzmult">Мультики</button>
            <button class="playlist-btn" data-playlist="soyuzmultoff">Мульт Off.</button>
            <button class="playlist-btn" data-playlist="tvruss">Russia TV</button>
            <button class="playlist-btn" data-playlist="tvruss2">Russia Off.</button>
        </div>
        <button class="embed-btn" id="embedBtn"><i class="fas fa-code"></i> Embed</button>
    </div>
    <div class="main">
        <div class="sidebar" id="sidebar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск канала" autocomplete="off">
            </div>
            <div class="channels-list" id="channelsList">
                <div style="padding:24px; text-align:center;">Загрузка...</div>
            </div>
        </div>
        <div class="video-area">
            <div class="player-wrapper">
                <div id="player-container"></div>
            </div>
            <div class="player-bar">
                <div class="channel-info">
                    <div class="current-name" id="currentChannelName">Выберите канал</div>
                    <div class="current-group" id="currentGroupName">––</div>
                </div>
                <div class="action-btns">
                    <button class="action-btn" id="copyStreamBtn"><i class="fas fa-link"></i> URL</button>
                    <button class="action-btn" id="fullscreenBtn"><i class="fas fa-expand"></i> Full</button>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="overlay" id="sidebarOverlay"></div>
<div id="embedModal" class="modal">
    <div class="modal-content">
        <button class="close-modal" id="closeModalBtn">&times;</button>
        <div style="margin-bottom: 12px;"><i class="fas fa-code"></i> Код для вставки</div>
        <div class="embed-code" id="embedCodeText"></div>
        <button class="copy-btn" id="copyEmbedBtn">Скопировать</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="playerjs.js"></script>
<script>
    (function() {
        // Список плейлистов
        const PLAYLISTS = {
            livem3u: 'https://secure-272717.tatnet.app/livem3u.tatnet.app/data/playlist.m3u',
            zabavaoff: 'https://raw.githubusercontent.com/CrocoUser/zabava-project/refs/heads/main/zabava-full.m3u',
            zabava: 'https://secure-272717.tatnet.app/livem3u.tatnet.app/zabava-full.m3u',
            soyuzmult: 'https://secure-272717.tatnet.app/iptvplay.tatnet.app/iptvlist.ru-mult (1).m3u',
            tvruss: 'https://secure-272717.tatnet.app/livem3u.tatnet.app/russ.m3u',
            tvruss2: 'https://secure-272717.tatnet.app/livetv.tatnet.app/russ.m3u',
            soyuzmultoff: 'https://secure-272717.tatnet.app/iptvplay.tatnet.app/iptvlist.ru-kids (1).m3u'
        };

        let currentPlaylist = 'livem3u';
        let allChannels = [];
        let currentChannel = null;
        let player = null;
        let searchTimeout = null;
        let lastQuery = '';

        // DOM
        const channelsDiv = document.getElementById('channelsList');
        const searchInput = document.getElementById('searchInput');
        const currentName = document.getElementById('currentChannelName');
        const currentGroup = document.getElementById('currentGroupName');
        const copyStreamBtn = document.getElementById('copyStreamBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const embedBtn = document.getElementById('embedBtn');
        const modal = document.getElementById('embedModal');
        const closeModal = document.getElementById('closeModalBtn');
        const copyEmbed = document.getElementById('copyEmbedBtn');
        const embedCodeDiv = document.getElementById('embedCodeText');

        // ----- Парсинг m3u -----
        async function fetchPlaylist(url) {
            try {
                const resp = await fetch(url, { signal: AbortSignal.timeout(10000) });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.text();
                const lines = data.split(/\r?\n/);
                const channels = [];
                let currentItem = null;
                let group = 'Основные';
                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (line.startsWith('#EXTINF')) {
                        let name = line.split(',')[1] || 'Без названия';
                        let grpMatch = line.match(/group-title="([^"]*)"/);
                        group = grpMatch ? grpMatch[1] : 'Общие';
                        currentItem = { name: name.trim(), group: group, url: null };
                    } else if (currentItem && line && !line.startsWith('#')) {
                        if (line.startsWith('http')) {
                            currentItem.url = line;
                            channels.push({ ...currentItem });
                        }
                        currentItem = null;
                    }
                }
                return channels;
            } catch(e) {
                console.error('Ошибка загрузки', e);
                return [];
            }
        }

        async function switchPlaylist(playlistId) {
            currentPlaylist = playlistId;
            channelsDiv.innerHTML = '<div style="padding:20px;text-align:center;">⏳ Загрузка...</div>';
            const url = PLAYLISTS[playlistId];
            if (!url) return;
            const channels = await fetchPlaylist(url);
            if (channels.length === 0) {
                channelsDiv.innerHTML = '<div style="padding:20px;text-align:center;">❌ Нет каналов</div>';
                allChannels = [];
                return;
            }
            allChannels = channels;
            lastQuery = '';
            searchInput.value = '';
            renderChannels('');
            currentChannel = null;
            currentName.textContent = 'Выберите канал';
            currentGroup.textContent = '––';
            if (player) {
                try { player.destroy(); } catch(e) {}
                player = null;
                document.getElementById('player-container').innerHTML = '';
            }
        }

        function renderChannels(query) {
            let filtered = allChannels;
            if (query) {
                const low = query.toLowerCase();
                filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(low) || ch.group.toLowerCase().includes(low));
            }
            if (!filtered.length) {
                channelsDiv.innerHTML = '<div style="padding:20px;text-align:center;">😐 Нет каналов</div>';
                return;
            }
            const fragment = document.createDocumentFragment();
            const activeUrl = currentChannel ? currentChannel.url : null;
            for (let ch of filtered) {
                const div = document.createElement('div');
                div.className = 'channel-item';
                if (activeUrl === ch.url) div.classList.add('active');
                div.setAttribute('data-url', ch.url);
                div.innerHTML = `<div style="flex:1; overflow:hidden;">
                    <div class="channel-name">${escapeHtml(ch.name)}</div>
                    <div class="channel-group">${escapeHtml(ch.group)}</div>
                </div>`;
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    playChannel(ch);
                    if (window.innerWidth <= 768) closeSidebar();
                });
                // также на touchstart для уверенности
                div.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    playChannel(ch);
                    if (window.innerWidth <= 768) closeSidebar();
                }, { passive: false });
                fragment.appendChild(div);
            }
            channelsDiv.innerHTML = '';
            channelsDiv.appendChild(fragment);
        }

        function playChannel(channel) {
            if (!channel || !channel.url) return;
            if (currentChannel && currentChannel.url === channel.url) return;
            currentChannel = channel;
            currentName.textContent = channel.name;
            currentGroup.textContent = channel.group;
            if (!player) {
                recreatePlayer(channel.url);
            } else {
                try {
                    player.src(channel.url);
                    player.play();
                } catch(e) {
                    recreatePlayer(channel.url);
                }
            }
            // обновить активный класс
            const items = channelsDiv.querySelectorAll('.channel-item');
            for (let item of items) {
                if (item.getAttribute('data-url') === channel.url) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            }
        }

        function recreatePlayer(url) {
            const container = document.getElementById('player-container');
            if (player) {
                try { player.destroy(); } catch(e) {}
                container.innerHTML = '';
            }
            player = new Playerjs({
                id: "player-container",
                file: url,
                autoplay: true,
                hls: 1,
                width: "100%",
                height: "100%",
                tracks: []
            });
        }

        // Поиск
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const val = e.target.value;
            lastQuery = val;
            searchTimeout = setTimeout(() => renderChannels(lastQuery), 200);
        });

        // Переключение плейлистов
        const playlistBtns = document.querySelectorAll('.playlist-btn');
        playlistBtns.forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.dataset.playlist;
                if (id === currentPlaylist) return;
                playlistBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                await switchPlaylist(id);
            });
        });

        // Кнопки управления
        copyStreamBtn.addEventListener('click', () => {
            if (currentChannel && currentChannel.url) {
                navigator.clipboard.writeText(currentChannel.url);
                alert('Ссылка скопирована');
            } else alert('Нет активного канала');
        });
        fullscreenBtn.addEventListener('click', () => {
            const container = document.getElementById('player-container');
            if (container.requestFullscreen) container.requestFullscreen();
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        });

        // Embed
        embedBtn.addEventListener('click', () => {
            if (!currentChannel) {
                alert('Сначала выберите канал');
                return;
            }
            const origin = window.location.origin;
            const code = `<iframe src="${origin}/embed.html?url=${encodeURIComponent(currentChannel.url)}&title=${encodeURIComponent(currentChannel.name)}" width="100%" height="500" frameborder="0" allowfullscreen></iframe>`;
            embedCodeDiv.textContent = code;
            modal.style.display = 'flex';
        });
        closeModal.addEventListener('click', () => modal.style.display = 'none');
        window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
        copyEmbed.addEventListener('click', () => {
            if (embedCodeDiv.textContent) {
                navigator.clipboard.writeText(embedCodeDiv.textContent);
                alert('Код скопирован');
            }
        });

        // ----- Мобильное меню (без багов) -----
        const sidebar = document.getElementById('sidebar');
        const overlayDiv = document.getElementById('sidebarOverlay');
        const menuBtn = document.getElementById('mobileMenuBtn');
        function openSidebar() { sidebar.classList.add('open'); overlayDiv.classList.add('show'); }
        function closeSidebar() { sidebar.classList.remove('open'); overlayDiv.classList.remove('show'); }
        if (menuBtn) {
            menuBtn.addEventListener('click', (e) => { e.stopPropagation(); openSidebar(); });
            menuBtn.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); openSidebar(); }, { passive: false });
        }
        overlayDiv.addEventListener('click', closeSidebar);
        overlayDiv.addEventListener('touchstart', (e) => { e.preventDefault(); closeSidebar(); }, { passive: false });
        window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Старт
        switchPlaylist('livem3u');
    })();
</script>
</body>
</html>
