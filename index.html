<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IPTVPlayer — быстрый мобильный плеер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0f1c;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            font-smoothing: antialiased;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
            background: #0a0f1c;
        }

        /* Шапка — легкая и быстрая */
        .header {
            background: rgba(0, 0, 0, 0.75);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
            z-index: 10;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #00d2ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.65rem;
            color: #aaa;
        }

        /* Скролл плейлистов — горизонтальный, не ломает верстку */
        .playlist-selector {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: thin;
            padding: 4px 0;
            -webkit-overflow-scrolling: touch;
            flex: 1;
        }

        .playlist-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #eee;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .playlist-btn.active {
            background: #00d2ff;
            color: #000;
            box-shadow: 0 2px 8px rgba(0, 210, 255, 0.3);
        }

        .embed-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        /* Основная зона */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Боковая панель — убираем тяжелый backdrop-filter на мобилах */
        .sidebar {
            width: 300px;
            background: #0c1120;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }

        .search-box {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px;
            background: #1e2335;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        /* Список каналов — ускоренная прокрутка */
        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 6px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            margin-bottom: 4px;
            border-radius: 12px;
            gap: 12px;
            cursor: pointer;
            transition: background 0.15s;
            touch-action: pan-y pinch-zoom;
            transform: translateZ(0);
            will-change: transform;
        }

        .channel-item:active {
            background: rgba(0, 210, 255, 0.2);
        }

        .channel-item.active {
            background: #00d2ff20;
            border-left: 3px solid #00d2ff;
        }

        .channel-logo {
            width: 32px;
            height: 32px;
            background: #1e2335;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .channel-info {
            flex: 1;
            min-width: 0;
        }

        .channel-name {
            font-weight: 500;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-group {
            font-size: 10px;
            color: #9aa1b0;
        }

        /* Видео область */
        .video-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            min-width: 0;
        }

        .player-wrapper {
            flex: 1;
            background: #000;
            position: relative;
        }

        #player-container {
            width: 100%;
            height: 100%;
            background: #000;
        }

        .player-controls {
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.6));
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .current-info {
            flex: 1;
            min-width: 0;
        }

        .current-channel-name {
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .current-group {
            font-size: 0.7rem;
            color: #bbb;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.12);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            touch-action: manipulation;
            transition: 0.15s;
        }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #151e2c;
            width: 90%;
            max-width: 650px;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #2a3350;
        }

        .embed-code {
            background: #0a0e1a;
            padding: 12px;
            border-radius: 14px;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            white-space: pre-wrap;
            margin: 15px 0;
            max-height: 180px;
            overflow: auto;
            user-select: all;
        }

        .copy-btn {
            background: #00d2ff;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        /* ----- Мобильная адаптация (без тяжелых фильтров) ----- */
        @media (max-width: 768px) {
            .header {
                padding: 8px 12px;
            }

            .logo h1 {
                font-size: 1.2rem;
            }

            .playlist-selector {
                order: 3;
                width: 100%;
                margin-top: 4px;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 280px;
                z-index: 200;
                transform: translateX(-100%);
                transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
                background: #0b1020;
                box-shadow: 2px 0 12px rgba(0, 0, 0, 0.6);
                border-right: none;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .mobile-menu-btn {
                display: flex !important;
                background: none;
                border: none;
                color: white;
                font-size: 1.4rem;
                padding: 0 8px 0 0;
                cursor: pointer;
            }

            .overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.6);
                z-index: 150;
            }

            .overlay.show {
                display: block;
            }

            .action-btn {
                padding: 5px 10px;
                font-size: 11px;
            }

            .current-channel-name {
                font-size: 0.9rem;
            }

            .channel-item {
                padding: 8px 8px;
            }
        }

        @media (min-width: 769px) {
            .mobile-menu-btn {
                display: none !important;
            }
        }

        /* Убираем потенциально тяжелые фильтры на мобильных */
        @media (max-width: 768px) {
            .header, .sidebar {
                backdrop-filter: none;
                background: #0b1020;
            }
        }

        /* Быстрая прокрутка */
        .channels-list::-webkit-scrollbar {
            width: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
            <div class="logo">
                <h1>IPTV Stream</h1>
                <p>быстрый плеер</p>
            </div>
            <div class="playlist-selector" id="playlistSelector">
                <button class="playlist-btn active" data-playlist="livem3u">LIVEM3U</button>
                <button class="playlist-btn" data-playlist="zabava">WINK Zabava</button>
                <button class="playlist-btn" data-playlist="zabavaoff">WINK Offical</button>
                <button class="playlist-btn" data-playlist="soyuzmult">Мультики ССР</button>
                <button class="playlist-btn" data-playlist="soyuzmultoff">Мультики Off.</button>
                <button class="playlist-btn" data-playlist="tvruss">Russia TV</button>
                <button class="playlist-btn" data-playlist="tvruss2">Russia TV Off.</button>
            </div>
            <button class="embed-btn" id="openEmbedModalBtn"><i class="fas fa-code"></i> Embed</button>
        </div>

        <div class="main-content">
            <div class="sidebar" id="sidebar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск канала..." autocomplete="off">
                </div>
                <div class="channels-list" id="channelsList">
                    <div style="text-align:center; padding:20px;">Загрузка...</div>
                </div>
            </div>
            <div class="video-area">
                <div class="player-wrapper">
                    <div id="player-container"></div>
                </div>
                <div class="player-controls">
                    <div class="current-info">
                        <div class="current-channel-name" id="currentChannelName">Выберите канал</div>
                        <div class="current-group" id="currentGroup">––</div>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn" id="fullscreenBtn"><i class="fas fa-expand"></i> На весь экран</button>
                        <button class="action-btn" id="copyStreamBtn"><i class="fas fa-link"></i> URL</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="sidebarOverlay"></div>

    <div id="embedModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                <span><i class="fas fa-code"></i> Embed код канала</span>
                <button class="close-modal" id="closeModalBtn" style="background:none; border:none; color:#fff; font-size:22px;">&times;</button>
            </div>
            <div>Вставьте код на свой сайт:</div>
            <div class="embed-code" id="embedCodeText"></div>
            <button class="copy-btn" id="copyEmbedBtn"><i class="fas fa-copy"></i> Скопировать код</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="playerjs.js"></script>
    <script>
        (function() {
            // ----- Конфигурация плейлистов -----
            const PLAYLISTS = {
                livem3u: 'https://secure-272717.tatnet.app/livem3u.tatnet.app/data/playlist.m3u',
                zabavaoff: 'https://raw.githubusercontent.com/CrocoUser/zabava-project/refs/heads/main/zabava-full.m3u',
                zabava: 'https://secure-272717.tatnet.app/livem3u.tatnet.app/zabava-full.m3u',
                soyuzmult: 'https://secure-272717.tatnet.app/iptvplay.tatnet.app/iptvlist.ru-mult (1).m3u',
                tvruss: 'https://secure-272717.tatnet.app/livem3u.tatnet.app/russ.m3u',
                tvruss2: 'https://secure-272717.tatnet.app/livetv.tatnet.app/russ.m3u',
                soyuzmultoff: 'https://secure-272717.tatnet.app/iptvplay.tatnet.app/iptvlist.ru-kids (1).m3u'
            };

            let currentPlaylistId = 'livem3u';
            let channels = [];               // сырой массив каналов
            let currentChannel = null;
            let playerInstance = null;
            let filterTimeout = null;
            let currentFilterQuery = '';

            // DOM элементы
            const channelsListEl = document.getElementById('channelsList');
            const searchInput = document.getElementById('searchInput');
            const currentChannelNameEl = document.getElementById('currentChannelName');
            const currentGroupEl = document.getElementById('currentGroup');
            const embedModal = document.getElementById('embedModal');
            const embedCodeText = document.getElementById('embedCodeText');

            // ---- Оптимизированный рендер списка (без лишних перерисовок активного) ----
            let currentRenderedChannels = [];   // последний отрендеренный массив
            let channelElementsMap = new Map();  // url -> DOM элемент (для быстрого обновления active)

            function renderChannelList(filteredChannels) {
                if (!filteredChannels) filteredChannels = channels;
                const query = currentFilterQuery;
                let filtered = filteredChannels;
                if (query) {
                    filtered = filteredChannels.filter(ch => 
                        ch.name.toLowerCase().includes(query) || 
                        ch.group.toLowerCase().includes(query)
                    );
                }
                if (!filtered.length) {
                    channelsListEl.innerHTML = '<div style="text-align:center; padding:24px;">📺 Нет каналов</div>';
                    channelElementsMap.clear();
                    currentRenderedChannels = [];
                    return;
                }

                // Используем DocumentFragment для быстрой отрисовки
                const fragment = document.createDocumentFragment();
                const newMap = new Map();
                const activeUrl = currentChannel ? currentChannel.url : null;

                filtered.forEach(channel => {
                    const div = document.createElement('div');
                    div.className = 'channel-item';
                    if (activeUrl === channel.url) div.classList.add('active');
                    div.setAttribute('data-url', channel.url);
                    div.innerHTML = `
                        <div class="channel-logo"><i class="fas fa-play-circle"></i></div>
                        <div class="channel-info">
                            <div class="channel-name">${escapeHtml(channel.name)}</div>
                            <div class="channel-group">${escapeHtml(channel.group)}</div>
                        </div>
                    `;
                    div.addEventListener('click', (e) => {
                        e.stopPropagation();
                        playChannel(channel);
                        // мобильное меню закрываем после выбора канала
                        if (window.innerWidth <= 768) {
                            closeMobileSidebar();
                        }
                    });
                    fragment.appendChild(div);
                    newMap.set(channel.url, div);
                });

                channelsListEl.innerHTML = '';
                channelsListEl.appendChild(fragment);
                channelElementsMap = newMap;
                currentRenderedChannels = [...filtered];
            }

            // Обновить только активный класс без полной перерисовки (супер быстро)
            function updateActiveChannelOnly(newChannel) {
                if (!channelElementsMap.size) return;
                const oldUrl = currentChannel?.url;
                if (oldUrl && channelElementsMap.has(oldUrl)) {
                    const oldEl = channelElementsMap.get(oldUrl);
                    oldEl.classList.remove('active');
                }
                if (newChannel && channelElementsMap.has(newChannel.url)) {
                    const newEl = channelElementsMap.get(newChannel.url);
                    newEl.classList.add('active');
                } else {
                    // если по какой-то причине элемента нет — делаем мягкий рендер
                    if (currentFilterQuery) {
                        renderChannelList(channels);
                    } else {
                        renderChannelList(channels);
                    }
                }
            }

            // ---- Плеер (без накопления утечек) ----
            function initPlayer(videoUrl, channelName) {
                if (!videoUrl) return;
                const container = document.getElementById('player-container');
                if (playerInstance) {
                    try {
                        // Меняем источник без пересоздания, если плеер поддерживает
                        playerInstance.src(videoUrl);
                        playerInstance.play();
                    } catch(e) {
                        recreatePlayer(videoUrl);
                    }
                } else {
                    recreatePlayer(videoUrl);
                }
            }

            function recreatePlayer(videoUrl) {
                const container = document.getElementById('player-container');
                if (playerInstance) {
                    try { playerInstance.destroy(); } catch(e) {}
                    container.innerHTML = '';
                }
                playerInstance = new Playerjs({
                    id: "player-container",
                    file: videoUrl,
                    autoplay: true,
                    hls: 1,
                    width: "100%",
                    height: "100%",
                    tracks: []
                });
            }

            // ---- Парсинг M3U (оптимизированный без лишних остановок) ----
            async function fetchAndParsePlaylist(url) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000);
                    const response = await fetch(url, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.text();
                    const lines = data.split(/\r?\n/);
                    const parsed = [];
                    let currentItem = null;
                    let groupTitle = '';

                    for (let i = 0; i < lines.length; i++) {
                        let line = lines[i].trim();
                        if (line.startsWith('#EXTINF')) {
                            let name = line.split(',')[1] || 'Без названия';
                            let matchGroup = line.match(/group-title="([^"]*)"/);
                            groupTitle = matchGroup ? matchGroup[1] : 'Общие';
                            currentItem = { name: name.trim(), group: groupTitle, url: null };
                        } 
                        else if (currentItem && line && !line.startsWith('#')) {
                            currentItem.url = line;
                            if (currentItem.url && (currentItem.url.startsWith('http') || currentItem.url.startsWith('https'))) {
                                parsed.push({ ...currentItem });
                            }
                            currentItem = null;
                        }
                    }
                    console.log(`✅ Загружено каналов: ${parsed.length} из ${url}`);
                    return parsed;
                } catch (error) {
                    console.error('Ошибка плейлиста:', error);
                    return [];
                }
            }

            // Загрузка плейлиста и рендер
            async function loadPlaylist(playlistId) {
                channelsListEl.innerHTML = '<div style="text-align:center; padding:24px;"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>';
                const playlistUrl = PLAYLISTS[playlistId];
                if (!playlistUrl) return;

                const loadedChannels = await fetchAndParsePlaylist(playlistUrl);
                if (loadedChannels.length === 0) {
                    channelsListEl.innerHTML = '<div style="text-align:center; padding:24px;">❌ Плейлист недоступен</div>';
                    channels = [];
                    currentChannel = null;
                    currentChannelNameEl.textContent = 'Нет каналов';
                    currentGroupEl.textContent = '––';
                    return;
                }
                channels = loadedChannels;
                currentChannel = null;
                currentChannelNameEl.textContent = 'Выберите канал';
                currentGroupEl.textContent = '––';
                currentFilterQuery = '';
                searchInput.value = '';
                renderChannelList(channels);
            }

            // Воспроизведение канала — без полного рендера списка
            function playChannel(channel) {
                if (!channel || !channel.url) return;
                if (currentChannel && currentChannel.url === channel.url) return;
                currentChannel = channel;
                currentChannelNameEl.textContent = channel.name;
                currentGroupEl.textContent = channel.group;
                initPlayer(channel.url, channel.name);
                // обновляем активный класс в списке (легковесно)
                updateActiveChannelOnly(channel);
            }

            // ---- Обработчики UI с debounce для поиска ----
            searchInput.addEventListener('input', (e) => {
                clearTimeout(filterTimeout);
                const val = e.target.value.toLowerCase();
                currentFilterQuery = val;
                filterTimeout = setTimeout(() => {
                    renderChannelList(channels);
                }, 250);
            });

            // Переключение плейлистов
            document.querySelectorAll('.playlist-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const newPlaylist = btn.dataset.playlist;
                    if (newPlaylist === currentPlaylistId) return;
                    document.querySelectorAll('.playlist-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentPlaylistId = newPlaylist;
                    // сброс плеера
                    if (playerInstance) {
                        try { playerInstance.destroy(); } catch(e) {}
                        playerInstance = null;
                        document.getElementById('player-container').innerHTML = '';
                    }
                    currentChannel = null;
                    currentChannelNameEl.textContent = 'Загрузка...';
                    currentGroupEl.textContent = '';
                    await loadPlaylist(currentPlaylistId);
                });
            });

            // ---- Embed логика (не трогаем, оставляем как есть) ----
            document.getElementById('openEmbedModalBtn').addEventListener('click', () => {
                if (!currentChannel) {
                    alert('Сначала выберите канал');
                    return;
                }
                const currentDomain = window.location.protocol + '//' + window.location.hostname + (window.location.port ? ':' + window.location.port : '');
                const embedHtml = `<iframe src="${currentDomain}/embed.html?url=${encodeURIComponent(currentChannel.url)}&title=${encodeURIComponent(currentChannel.name)}" width="100%" height="500" frameborder="0" allowfullscreen></iframe>`;
                embedCodeText.textContent = embedHtml;
                embedModal.style.display = 'flex';
            });

            document.getElementById('closeModalBtn').addEventListener('click', () => {
                embedModal.style.display = 'none';
            });
            window.addEventListener('click', (e) => {
                if (e.target === embedModal) embedModal.style.display = 'none';
            });
            document.getElementById('copyEmbedBtn').addEventListener('click', () => {
                if (embedCodeText.textContent) {
                    navigator.clipboard.writeText(embedCodeText.textContent);
                    alert('✅ Embed код скопирован');
                }
            });
            document.getElementById('copyStreamBtn').addEventListener('click', () => {
                if (currentChannel && currentChannel.url) {
                    navigator.clipboard.writeText(currentChannel.url);
                    alert('Ссылка потока скопирована');
                } else {
                    alert('Нет активного канала');
                }
            });
            document.getElementById('fullscreenBtn').addEventListener('click', () => {
                const container = document.getElementById('player-container');
                if (container.requestFullscreen) container.requestFullscreen();
                else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
            });

            // ---- Мобильное меню без тормозов ----
            const sidebar = document.getElementById('sidebar');
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const sidebarOverlay = document.getElementById('sidebarOverlay');

            function closeMobileSidebar() {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('show');
            }
            function toggleSidebar() {
                sidebar.classList.toggle('open');
                sidebarOverlay.classList.toggle('show');
            }

            if (mobileMenuBtn) {
                mobileMenuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleSidebar();
                });
            }
            sidebarOverlay.addEventListener('click', closeMobileSidebar);
            // При клике на канал уже закрываем внутри playChannel, дополнительно через делегирование не нужно

            // Адаптив: при ресайзе закрываем меню
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (window.innerWidth > 768) {
                        closeMobileSidebar();
                    }
                }, 150);
            });

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            // Старт
            loadPlaylist('livem3u');
        })();
    </script>
</body>
</html>
